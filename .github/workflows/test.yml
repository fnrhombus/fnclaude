name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l ./src)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (race + coverage)
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Enforce coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 80.0) { print "::error::coverage " t "% is below threshold 80%"; exit 1 } }'

      - name: Windows cross-compile check
        run: GOOS=windows GOARCH=amd64 go build ./src/
