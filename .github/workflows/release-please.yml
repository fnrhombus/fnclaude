name: Release Please

on:
  push:
    branches:
      - main
  # Manual trigger to catch up state when something stalled the chain.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          # PAT (not GITHUB_TOKEN) so the release PR's pull_request.opened
          # event fires auto-merge.yml. GITHUB_TOKEN-created PRs don't
          # trigger workflows, which is why release PRs used to sit open.
          token: ${{ secrets.AUTOMERGE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Auto-merge the release-please PR as soon as required checks pass.
      # Branch protection on main requires the `test` job to be green, so
      # this enables auto-merge rather than merging unconditionally — the
      # actual merge happens when CI is green on the release PR.
      - name: Enable auto-merge on release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_PAT }}
        # --repo is required: this job has no checkout, so gh can't infer
        # the target repo and fails with "fatal: not a git repository".
        run: |
          pr_number=$(echo '${{ steps.release.outputs.prs }}' | jq -r '.[0].number')
          if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
            gh pr merge --auto --squash --repo "$GITHUB_REPOSITORY" "$pr_number"
          fi
