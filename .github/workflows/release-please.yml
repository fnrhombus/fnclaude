name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Auto-merge the release-please PR as soon as required checks pass.
      # Branch protection on main requires the `test` job to be green, so
      # this enables auto-merge rather than merging unconditionally — the
      # actual merge happens when CI is green on the release PR.
      - name: Enable auto-merge on release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(echo '${{ steps.release.outputs.prs }}' | jq -r '.[0].number')
          if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
            gh pr merge --auto --squash "$pr_number"
          fi
