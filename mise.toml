[tools]
go = "1.24"

[tasks.build]
description = "Build the fnclaude binary into bin/"
run = "go build -o bin/fnclaude ./src/"

[tasks.test]
description = "Run the Go test suite"
run = "go test -count=1 ./..."

[tasks.install-dev]
description = "Build + symlink bin/fnclaude into ~/.local/bin/fnc-dev (deliberately separate from the AUR-installed `fnclaude` so dev builds don't shadow the release binary)"
depends = ["build"]
run = "ln -sf $PWD/bin/fnclaude $HOME/.local/bin/fnc-dev"
